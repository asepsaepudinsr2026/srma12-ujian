<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ujian - SRMA 12 Bogor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: #0f172a;
            color: white;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 { font-size: 18px; }
        
        .badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
        }

        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .ujian-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .ujian-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .ujian-card h3 { color: #facc15; margin-bottom: 10px; font-size: 18px; }
        .ujian-card p { color: #94a3b8; font-size: 14px; margin-bottom: 5px; }
        
        .btn-mulai {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #facc15, #f97316);
            color: #111827;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
        }

        #examFrame {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            z-index: 9999;
            display: none;
        }

        #examFrame iframe {
            width: 100%;
            height: calc(100% - 50px);
            border: none;
        }

        .exam-bar {
            background: #1e293b;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-selesai {
            padding: 8px 20px;
            border: none;
            border-radius: 50px;
            background: #ef4444;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h2>🎓 Portal Ujian</h2>
            <span id="userInfo" class="badge">Memuat...</span>
        </div>
        <button onclick="logout()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 20px; border-radius: 50px; cursor: pointer;">
            Keluar
        </button>
    </div>

    <div class="container">
        <h3 style="margin-bottom: 10px;">📋 Pilih Ujian</h3>
        <p style="color: #94a3b8; font-size: 14px;">Pilih mata pelajaran dan masukkan token ujian.</p>
        
        <div class="ujian-grid" id="listUjian">
            <div style="text-align: center; padding: 40px; color: #64748b;">
                ⏳ Memuat jadwal ujian...
            </div>
        </div>
    </div>

    <!-- EXAM FULLSCREEN -->
    <div id="examFrame">
        <div class="exam-bar">
            <span>🛡️ Mode Ujian Aman Aktif</span>
            <button class="btn-selesai" onclick="selesaiUjian()">Selesai</button>
        </div>
        <iframe id="frameUjian" src=""></iframe>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>

    <script>
        // Ambil data dari sessionStorage
        const nis = sessionStorage.getItem('nis');
        const nama = sessionStorage.getItem('nama');
        const kelas = sessionStorage.getItem('kelas');
        const cameraVerified = sessionStorage.getItem('cameraVerified');

        if (!nis || !nama || !cameraVerified) {
            alert('Silakan login dan verifikasi kamera terlebih dahulu!');
            window.location.href = 'index.html';
        }

        // Tampilkan info user
        document.getElementById('userInfo').innerText = nama + ' | ' + kelas;

        // Load ujian dari Firebase
        async function loadUjian() {
            const list = document.getElementById('listUjian');
            
            try {
                const snapshot = await DB.getUjian();
                const ujianData = snapshot.val();

                if (!ujianData) {
                    list.innerHTML = '<div style="text-align: center; padding: 40px; color: #64748b;">📭 Belum ada ujian tersedia.</div>';
                    return;
                }

                let html = '';
                Object.keys(ujianData).forEach(id => {
                    const u = ujianData[id];
                    
                    // Cek apakah ujian untuk kelas ini
                    if (u.kelas === 'semua' || u.kelas === kelas) {
                        html += `
                            <div class="ujian-card">
                                <h3>📘 ${u.mapel}</h3>
                                <p>🎯 Kelas: ${u.kelas}</p>
                                <p>⏱️ Durasi: ${u.durasi} menit</p>
                                <p>📝 Token: <span style="color: #facc15;">${u.token}</span></p>
                                <button class="btn-mulai" onclick="mulaiUjian('${u.link}', '${u.token}', '${u.mapel}')">
                                    🚀 Mulai Kerjakan
                                </button>
                            </div>
                        `;
                    }
                });

                if (html === '') {
                    html = '<div style="text-align: center; padding: 40px; color: #64748b;">📭 Tidak ada ujian untuk kelas Anda.</div>';
                }

                list.innerHTML = html;

            } catch (error) {
                console.error(error);
                list.innerHTML = '<div style="text-align: center; padding: 40px; color: #ef4444;">❌ Gagal memuat ujian.</div>';
            }
        }

        function mulaiUjian(link, tokenAsli, mapel) {
            const tokenInput = prompt('Masukkan Token Ujian:');
            
            if (tokenInput !== tokenAsli) {
                alert('⚠️ Token salah!');
                return;
            }

            // Update monitoring
            DB.updateMonitoring(nis, {
                status: 'Sedang Mengerjakan',
                mapel: mapel,
                waktuMulai: new Date().toISOString()
            });

            // Fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            // Tampilkan iframe
            document.getElementById('frameUjian').src = link;
            document.getElementById('examFrame').style.display = 'block';

            // Anti cheat - deteksi tab switching
            document.addEventListener('visibilitychange', handleVisibilityChange);

            // Kirim heartbeat
            window.heartbeatInterval = setInterval(() => {
                DB.updateMonitoring(nis, {
                    lastHeartbeat: new Date().toISOString(),
                    status: 'Sedang Mengerjakan'
                });
            }, 30000);
        }

        function handleVisibilityChange() {
            if (document.hidden) {
                DB.updateMonitoring(nis, {
                    pelanggaran: 'Pindah Tab',
                    status: '⚠️ TERDETEKSI CURANG'
                });

                DB.addLog({
                    timestamp: new Date().toISOString(),
                    aksi: 'PELANGGARAN',
                    detail: 'Siswa pindah tab saat mengerjakan ujian',
                    user: nama + ' (' + nis + ')'
                });

                alert('🚨 Anda terdeteksi pindah tab! Ini akan dicatat.');
            }
        }

        function selesaiUjian() {
            if (!confirm('Yakin ingin menyelesaikan ujian?')) return;

            // Update status
            DB.updateMonitoring(nis, {
                status: 'Selesai',
                waktuSelesai: new Date().toISOString()
            });

            // Cleanup
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }

            document.getElementById('examFrame').style.display = 'none';
            document.getElementById('frameUjian').src = '';
            document.removeEventListener('visibilitychange', handleVisibilityChange);
            
            if (window.heartbeatInterval) {
                clearInterval(window.heartbeatInterval);
            }

            alert('✅ Ujian selesai. Terima kasih!');
        }

        function logout() {
            if (confirm('Yakin ingin keluar?')) {
                sessionStorage.clear();
                window.location.href = 'index.html';
            }
        }

        // Load saat ready
        loadUjian();

        // Kirim heartbeat umum
        setInterval(() => {
            DB.updateMonitoring(nis, {
                lastHeartbeat: new Date().toISOString()
            });
        }, 30000);
    </script>

</body>
</html>
